name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Check formatting and linting
  # ─────────────────────────────────────────────────────────────────────────────
  fmt-and-clippy:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ─────────────────────────────────────────────────────────────────────────────
  # Run tests for all workspace crates
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate:
          - zeroclawed
          - nonzeroclaw
          - outpost
          - clash
          - robot-kit
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Test ${{ matrix.crate }}
        run: cargo test -p ${{ matrix.crate }} --all-features

  # ─────────────────────────────────────────────────────────────────────────────
  # Build release binaries
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [fmt-and-clippy, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        run: cargo build --release -p zeroclawed -p nonzeroclaw

      - name: Check binary sizes
        run: |
          ls -lh target/release/zeroclawed
          ls -lh target/release/nonzeroclaw

  # ─────────────────────────────────────────────────────────────────────────────
  # Loom concurrency testing (for zeroclawed)
  # ─────────────────────────────────────────────────────────────────────────────
  loom:
    name: Loom Concurrency Tests
    runs-on: ubuntu-latest
    env:
      LOOM_MAX_PREEMPTIONS: 2
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-loom-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Loom tests
        run: RUSTFLAGS="--cfg loom" cargo test --test loom -p zeroclawed

  # ─────────────────────────────────────────────────────────────────────────────
  # Cross-compilation for ARM64
  # ─────────────────────────────────────────────────────────────────────────────
  cross-compile-arm:
    name: Cross Compile (ARM64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cross compile for ARM64
        run: cross build --target aarch64-unknown-linux-gnu -p zeroclawed -p nonzeroclaw
