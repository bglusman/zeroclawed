name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Check formatting and linting
  # ─────────────────────────────────────────────────────────────────────────────
  fmt-and-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ─────────────────────────────────────────────────────────────────────────────
  # Run tests for all workspace crates
  # ─────────────────────────────────────────────────────────────────────────────
  test-crates:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate:
          - zeroclawed
          - adversary-detector
          - host-agent
          - onecli-client
          - clashd
          - security-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Test ${{ matrix.crate }}
        run: cargo test -p ${{ matrix.crate }}

  # Aggregator job that reports a single `test` status check (required by ruleset)
  test:
    runs-on: ubuntu-latest
    needs: [test-crates]
    if: always()
    steps:
      - name: Verify all crate test jobs succeeded
        run: |
          if [ "${{ needs.test-crates.result }}" != "success" ]; then
            echo "One or more crate test jobs failed: ${{ needs.test-crates.result }}"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Loom concurrency tests (exhaustive concurrency exploration)
  # ─────────────────────────────────────────────────────────────────────────────
  loom:
    name: Loom Concurrency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-loom-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Loom tests
        run: cargo test -p loom-tests
        env:
          LOOM_MAX_PREEMPTIONS: 2
          RUSTFLAGS: "--cfg loom"

  # ─────────────────────────────────────────────────────────────────────────────
  # Build release binaries
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [fmt-and-clippy, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        run: cargo build --release -p zeroclawed -p onecli-client -p security-gateway -p adversary-detector

      - name: Check binary sizes
        run: |
          ls -lh target/release/zeroclawed || true
          ls -lh target/release/onecli || true
          ls -lh target/release/security-gateway || true
          ls -lh target/release/adversary-detector || true
